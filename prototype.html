<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MyPlanner · 首頁原型</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700;9..144,800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ==========================================================
   MyPlanner · 首頁原型
   你可以編輯 :root 變數換色調，整個 UI 會同步更新
   字體、卡片、動畫、日曆資料都在下面對應區塊
   ========================================================== */
:root {
  /* ---------- 顏色 ---------- */
  --bg:           #07070D;
  --phone:        #0D0D14;
  --surface:      #14141F;
  --surface-2:    #1A1A28;
  --border:       rgba(255,255,255,0.08);
  --border-strong:rgba(255,255,255,0.16);

  --primary:      #7C6FE0;
  --primary-2:    #A89CF0;
  --secondary:    #5B8AF0;

  --text:         #F5F3FF;
  --text-dim:     #9B98B8;
  --text-mute:    #5A5878;

  /* 班別顏色 */
  --morning:      #FFB86B;   /* 早班 */
  --evening:      #9B7CE8;   /* 晚班 */
  --off:          #4A4864;   /* 休假 */
  --warn:         #FFB86B;   /* 有花費小點 */

  /* 字體 */
  --font-body:    'DM Sans', system-ui, sans-serif;
  --font-display: 'Fraunces', Georgia, serif;
  --font-mono:    'JetBrains Mono', ui-monospace, monospace;

  /* 背景光暈 */
  --stage: radial-gradient(ellipse at 25% 15%, rgba(124,111,224,0.28), transparent 50%),
           radial-gradient(ellipse at 80% 70%, rgba(91,138,240,0.22), transparent 55%),
           #07070D;
}

* { box-sizing:border-box; margin:0; padding:0; }

html, body {
  font-family: var(--font-body);
  background: var(--stage);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  font-feature-settings: 'ss01','ss02','cv11';
}

/* 噪點層（增加質感） */
body::before {
  content:''; position:fixed; inset:0; pointer-events:none; z-index:99;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.4'/></svg>");
  opacity:0.06; mix-blend-mode:overlay;
}

/* ====== 舞台 ====== */
.stage { min-height:100vh; display:grid; place-items:center; padding:40px 20px; }
.phone-wrap { position:relative; }

.aurora { position:absolute; border-radius:50%; filter:blur(90px); pointer-events:none; z-index:0; }
.aurora.a1 { width:420px; height:420px; background:rgba(124,111,224,0.38); top:-120px; left:-130px; }
.aurora.a2 { width:380px; height:380px; background:rgba(91,138,240,0.30); bottom:-100px; right:-140px; }
.aurora.a3 { width:260px; height:260px; background:rgba(255,184,107,0.18); top:40%; right:-80px; }

.brand-hint {
  position:absolute; right:-190px; top:50%;
  transform:translateY(-50%) rotate(90deg); transform-origin:left;
  font-family:var(--font-mono); font-size:11px; color:var(--text-mute);
  letter-spacing:0.3em; white-space:nowrap; opacity:0.55;
}

/* ====== 手機外殼 390x844 ====== */
.phone {
  width: 390px; height: 844px;
  background: var(--phone);
  border-radius: 52px;
  overflow: hidden;
  position: relative;
  z-index:1;
  box-shadow:
    0 0 0 4px rgba(255,255,255,0.04),
    0 0 0 12px rgba(0,0,0,0.6),
    0 40px 100px rgba(124,111,224,0.28),
    0 20px 60px rgba(0,0,0,0.7);
}
.phone::before { /* 瀏海 */
  content:''; position:absolute; top:10px; left:50%;
  transform:translateX(-50%);
  width:120px; height:30px; background:#000; border-radius:20px; z-index:50;
}

.status-bar {
  position:absolute; top:0; left:0; right:0; height:50px;
  display:flex; justify-content:space-between; align-items:center;
  padding:14px 32px 0; font-size:16px; font-weight:600; z-index:40;
  letter-spacing:0.2px;
}
.status-bar .icons { display:flex; gap:6px; align-items:center; font-size:14px; opacity:0.9; }

.screen {
  position:absolute; inset:0;
  padding-top:50px; padding-bottom:90px;
  overflow-y:auto; scroll-behavior:smooth;
}
.screen::-webkit-scrollbar { display:none; }

/* ====== 頂部日期 ====== */
.app-header {
  padding: 22px 24px 18px;
  display:flex; justify-content:space-between; align-items:flex-end;
}
.eyebrow {
  font-size:13px; font-weight:600;
  color:var(--text-dim); letter-spacing:0.14em; text-transform:uppercase;
}
.big-day {
  font-family:var(--font-display);
  font-variation-settings: "opsz" 144, "wght" 500;
  font-size:72px; line-height:0.95; letter-spacing:-0.04em;
  margin-top:4px; color:var(--text);
}
.sub { font-size:16px; color:var(--text-dim); margin-top:6px; font-weight:500; }

.header-tools { display:flex; gap:8px; align-items:center; }
.lang-pill, .tool-pill {
  background:rgba(255,255,255,0.06);
  border:1px solid var(--border);
  backdrop-filter: blur(10px);
  padding:10px 14px; border-radius:999px;
  font-size:13px; font-weight:600; color:var(--text);
  cursor:pointer; display:flex; gap:6px; align-items:center;
  transition:all 0.2s;
  font-family:inherit;
}
.lang-pill:hover, .tool-pill:hover { background:rgba(255,255,255,0.1); transform:translateY(-1px); }
.tool-pill .dot-ind {
  width:7px; height:7px; border-radius:999px;
  background:var(--text-mute);
  transition:all 0.2s;
}
.tool-pill.on {
  background:linear-gradient(135deg, rgba(124,111,224,0.35), rgba(91,138,240,0.25));
  border-color:rgba(168,156,240,0.55);
  color:#EDE8FF;
  box-shadow:0 0 0 3px rgba(124,111,224,0.12), 0 6px 20px rgba(124,111,224,0.25);
}
.tool-pill.on .dot-ind {
  background:#5EE7A5;
  box-shadow:0 0 10px rgba(94,231,165,0.7);
  animation:pulseDot 1.6s ease-in-out infinite;
}
@keyframes pulseDot {
  0%,100% { transform:scale(1); opacity:1; }
  50%     { transform:scale(1.4); opacity:0.7; }
}

/* ====== 本月概況卡（紫藍漸層） ====== */
.hero {
  margin: 0 20px 20px;
  border-radius: 28px;
  padding: 26px 24px 22px;
  position:relative; overflow:hidden;
  background:
    radial-gradient(ellipse at top right, rgba(255,184,107,0.18), transparent 60%),
    linear-gradient(135deg, #7C6FE0 0%, #5B8AF0 60%, #4C71E8 100%);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.25),
    0 20px 40px -15px rgba(124,111,224,0.55);
}
.hero::before {
  content:''; position:absolute; inset:0;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='100' height='100'><filter id='n'><feTurbulence baseFrequency='0.85'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.4'/></svg>");
  opacity:0.1; mix-blend-mode:overlay; pointer-events:none;
}
.hero > * { position:relative; z-index:1; }

.hero-row { display:flex; justify-content:space-between; align-items:center; }
.hero-label { font-size:14px; color:rgba(255,255,255,0.9); font-weight:600; letter-spacing:0.04em; }
.hero-badge {
  background:rgba(255,255,255,0.2);
  backdrop-filter:blur(10px);
  padding:6px 12px; border-radius:999px;
  font-size:12px; font-weight:700; letter-spacing:0.06em;
}
.hero-amount {
  font-family:var(--font-display);
  font-variation-settings:"opsz" 144, "wght" 600;
  font-size:56px; line-height:1; letter-spacing:-0.04em;
  margin-top:18px;
  display:flex; align-items:baseline; gap:6px;
}
.hero-currency {
  font-family:var(--font-body); font-size:22px; font-weight:600; opacity:0.85; letter-spacing:0;
}
.hero-sub { font-size:14px; color:rgba(255,255,255,0.75); margin-top:6px; font-weight:500; }

.hero-stats { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:22px; }
.hero-stat {
  background:rgba(255,255,255,0.14);
  backdrop-filter:blur(14px);
  border:1px solid rgba(255,255,255,0.2);
  border-radius:16px;
  padding:12px 14px;
}
.hero-stat .tag {
  font-size:12px; color:rgba(255,255,255,0.8);
  font-weight:700; letter-spacing:0.08em; text-transform:uppercase;
}
.hero-stat .val {
  font-family:var(--font-display);
  font-variation-settings:"opsz" 72, "wght" 600;
  font-size:28px; line-height:1.1; margin-top:4px; letter-spacing:-0.02em;
}
.hero-stat .val small {
  font-family:var(--font-body);
  font-size:14px; font-weight:600; opacity:0.8; margin-left:2px;
}

/* 進度條 */
.hero-bar { margin-top:18px; height:6px; border-radius:999px; background:rgba(255,255,255,0.15); overflow:hidden; }
.hero-bar-fill {
  height:100%; width:0%;
  background:linear-gradient(90deg, #FFE2C1, #FFFFFF);
  border-radius:999px;
  transition:width 1.1s cubic-bezier(.2,.8,.2,1);
  box-shadow:0 0 12px rgba(255,255,255,0.5);
}

/* ====== 本週摘要條 ====== */
.week-strip {
  margin:0 20px 20px;
  display:flex; gap:8px;
  overflow-x:auto;
  padding:2px;
  scrollbar-width:none;
}
.week-strip::-webkit-scrollbar { display:none; }
.week-chip {
  flex:0 0 auto;
  background:rgba(26,26,40,0.6);
  backdrop-filter:blur(14px);
  border:1px solid var(--border);
  border-radius:14px;
  padding:10px 14px;
  display:flex; flex-direction:column; gap:2px;
  min-width:64px;
}
.week-chip .wc-label { font-size:11px; font-weight:600; color:var(--text-mute); letter-spacing:0.1em; text-transform:uppercase; }
.week-chip .wc-val { font-size:16px; font-weight:700; color:var(--text); display:flex; align-items:center; gap:4px; }
.week-chip .wc-val .sw { width:6px; height:6px; border-radius:999px; }
.week-chip .wc-val .sw.m { background:var(--morning); }
.week-chip .wc-val .sw.e { background:var(--evening); }
.week-chip .wc-val .sw.o { background:var(--off); }
.week-chip.total {
  background:linear-gradient(135deg, rgba(124,111,224,0.2), rgba(91,138,240,0.1));
  border-color:rgba(168,156,240,0.35);
}
.week-chip.total .wc-val { color:#E8E3FF; }

/* ====== ghost 按鈕 ====== */
.ghost-btn {
  background:rgba(255,255,255,0.04);
  border:1px solid var(--border);
  color:var(--text-dim);
  font-family:inherit; font-size:12px; font-weight:600;
  padding:8px 12px; border-radius:10px;
  display:flex; align-items:center; gap:6px;
  cursor:pointer; transition:all 0.15s;
  margin-right:4px;
}
.ghost-btn:hover { background:rgba(124,111,224,0.15); border-color:rgba(168,156,240,0.4); color:var(--text); }

/* ====== 日曆卡 ====== */
.calendar-card {
  margin:0 20px 20px;
  background:rgba(26,26,40,0.7);
  backdrop-filter:blur(20px);
  border:1px solid var(--border);
  border-radius:28px;
  padding:22px 18px 20px;
  box-shadow:0 10px 30px -10px rgba(0,0,0,0.5);
}
.cal-header { display:flex; justify-content:space-between; align-items:center; padding:0 6px 16px; }
.cal-title {
  font-family:var(--font-display);
  font-variation-settings:"opsz" 72, "wght" 600;
  font-size:22px; font-weight:600; letter-spacing:-0.01em;
}
.cal-nav { display:flex; gap:6px; }
.cal-nav button {
  width:36px; height:36px; border-radius:10px;
  background:rgba(255,255,255,0.05);
  border:1px solid var(--border);
  color:var(--text);
  font-size:18px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  font-family:inherit;
  transition:all 0.15s;
}
.cal-nav button:hover { background:rgba(124,111,224,0.2); border-color:rgba(124,111,224,0.45); }

.weekday-row { display:grid; grid-template-columns:repeat(7,1fr); margin-bottom:4px; }
.weekday-row div {
  text-align:center; font-size:13px; font-weight:600;
  color:var(--text-mute); letter-spacing:0.1em; padding:8px 0;
}
.weekday-row div:first-child, .weekday-row div:last-child { color:#7B7598; }

.days-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:4px; }
.day-cell {
  aspect-ratio: 1 / 1.12;
  border-radius:12px;
  background:transparent; border:1px solid transparent;
  color:var(--text);
  cursor:pointer; position:relative;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:4px; transition:all 0.18s ease; padding-top:6px;
  font-family:inherit;
}
.day-cell:hover { background:rgba(255,255,255,0.05); }
.day-cell:active { transform:scale(0.94); }
.day-cell.outside { opacity:0.32; }
.day-cell.outside .num { color:var(--text-mute); }
.day-cell.today {
  background:linear-gradient(135deg, rgba(124,111,224,0.32), rgba(91,138,240,0.22));
  border:1px solid rgba(168,156,240,0.55);
  box-shadow:inset 0 0 0 1px rgba(255,255,255,0.06);
}
.day-cell.today .num {
  font-family:var(--font-display);
  font-variation-settings:"opsz" 72, "wght" 700;
  font-size:22px; color:#EDE8FF;
}
.day-cell .num { font-size:16px; font-weight:500; line-height:1; }
.day-cell .dot {
  width:6px; height:6px; border-radius:999px;
  background:transparent; margin-bottom:2px;
}
.day-cell.has-morning .dot { background:var(--morning); box-shadow:0 0 8px rgba(255,184,107,0.55); }
.day-cell.has-evening .dot { background:var(--evening); box-shadow:0 0 8px rgba(155,124,232,0.55); }
.day-cell.has-off     .dot { background:var(--off); }
.day-cell.has-expense::after {
  content:''; position:absolute; top:7px; right:7px;
  width:5px; height:5px; border-radius:999px; background:var(--warn);
}

/* 圖例 */
.legend {
  display:flex; justify-content:center; gap:18px;
  margin-top:14px; padding-top:14px;
  border-top:1px solid var(--border);
  flex-wrap:wrap;
}
.legend-item { display:flex; align-items:center; gap:6px; font-size:13px; color:var(--text-dim); font-weight:500; }
.legend-item .sw { width:8px; height:8px; border-radius:999px; }
.legend-item .sw.m { background:var(--morning); }
.legend-item .sw.e { background:var(--evening); }
.legend-item .sw.o { background:var(--off); }

/* ====== 底部 nav ====== */
.bottom-nav {
  position:absolute; bottom:0; left:0; right:0; height:82px;
  background:rgba(13,13,20,0.88);
  backdrop-filter:blur(20px);
  border-top:1px solid rgba(255,255,255,0.06);
  display:flex; justify-content:space-around; align-items:flex-start;
  padding-top:14px; z-index:30;
}
.nav-item {
  display:flex; flex-direction:column; align-items:center; gap:4px;
  color:var(--text-mute); font-size:13px; font-weight:600; cursor:pointer; flex:1;
  transition:color 0.2s;
}
.nav-item svg { width:24px; height:24px; stroke:currentColor; fill:none; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; }
.nav-item:hover { color:var(--primary-2); }
.nav-item.active { color:var(--primary-2); }

/* ====== 底部抽屜（Bottom Sheet） ====== */
.scrim {
  position:absolute; inset:0;
  background:rgba(0,0,0,0.55);
  backdrop-filter:blur(6px);
  opacity:0; pointer-events:none;
  transition:opacity 0.3s; z-index:60;
}
.scrim.show { opacity:1; pointer-events:all; }

.sheet {
  position:absolute; bottom:0; left:0; right:0;
  background:rgba(22,22,34,0.96);
  backdrop-filter:blur(30px);
  border-top:1px solid rgba(255,255,255,0.1);
  border-radius:32px 32px 0 0;
  padding:12px 24px 36px;
  transform:translateY(100%);
  transition:transform 0.42s cubic-bezier(.18,.82,.24,1);
  z-index:70;
  box-shadow:0 -20px 60px rgba(0,0,0,0.55);
  max-height:80%; overflow-y:auto;
}
.sheet.show { transform:translateY(0); }
.sheet::-webkit-scrollbar { display:none; }

.handle {
  width:40px; height:5px; background:rgba(255,255,255,0.22);
  border-radius:10px; margin:0 auto 16px;
}
.sheet-title {
  font-family:var(--font-display);
  font-variation-settings:"opsz" 72, "wght" 600;
  font-size:26px; letter-spacing:-0.01em;
}
.sheet-sub { font-size:14px; color:var(--text-dim); margin-top:4px; margin-bottom:22px; }

.field-label {
  font-size:13px; font-weight:700;
  color:var(--text-dim); letter-spacing:0.1em; text-transform:uppercase;
  margin-bottom:10px;
}

.shift-row { display:flex; gap:8px; margin-bottom:22px; }
.shift-pill {
  flex:1; padding:14px 0;
  border-radius:16px;
  background:rgba(255,255,255,0.04);
  border:1.5px solid var(--border);
  color:var(--text);
  font-family:inherit; font-size:16px; font-weight:600;
  cursor:pointer; transition:all 0.2s;
  display:flex; flex-direction:column; align-items:center; gap:6px;
}
.shift-pill .emoji { font-size:20px; }
.shift-pill[data-v="早班"].active {
  background:linear-gradient(135deg, rgba(255,184,107,0.22), rgba(255,184,107,0.08));
  border-color:var(--morning); color:#FFD9B2;
  box-shadow:0 8px 24px rgba(255,184,107,0.14);
}
.shift-pill[data-v="晚班"].active {
  background:linear-gradient(135deg, rgba(155,124,232,0.24), rgba(124,111,224,0.08));
  border-color:var(--evening); color:#DCD2FF;
  box-shadow:0 8px 24px rgba(124,111,224,0.2);
}
.shift-pill[data-v="休假"].active {
  background:linear-gradient(135deg, rgba(91,138,240,0.2), rgba(91,138,240,0.06));
  border-color:var(--secondary); color:#D0E0FF;
  box-shadow:0 8px 24px rgba(91,138,240,0.18);
}

/* ====== 加給 / 扣除 chips ====== */
.bonus-row { display:flex; gap:8px; margin-bottom:22px; flex-wrap:wrap; }
.bonus-chip {
  flex:1; min-width:94px;
  padding:12px 10px; border-radius:14px;
  background:rgba(255,255,255,0.04);
  border:1.5px solid var(--border);
  color:var(--text); font-family:inherit;
  font-size:14px; font-weight:600;
  cursor:pointer; transition:all 0.2s;
  display:flex; flex-direction:column; align-items:center; gap:2px;
}
.bonus-chip .mul {
  font-family:var(--font-mono);
  font-size:12px; font-weight:500; opacity:0.7;
}
.bonus-chip[data-v="ot"].active {
  background:linear-gradient(135deg, rgba(94,231,165,0.2), rgba(94,231,165,0.05));
  border-color:#5EE7A5; color:#B5F2D3;
}
.bonus-chip[data-v="hol"].active {
  background:linear-gradient(135deg, rgba(255,107,139,0.2), rgba(255,107,139,0.05));
  border-color:#FF8FA3; color:#FFC7D1;
}
.bonus-chip[data-v="brk"].active {
  background:linear-gradient(135deg, rgba(155,152,184,0.18), rgba(155,152,184,0.05));
  border-color:var(--text-dim); color:var(--text-dim);
}

/* ====== 快速填班浮動條 ====== */
.quick-bar {
  position:absolute;
  bottom:82px; left:12px; right:12px;
  background:rgba(16,16,26,0.94);
  backdrop-filter:blur(24px);
  border:1px solid rgba(168,156,240,0.25);
  border-radius:20px;
  padding:12px 14px 14px;
  box-shadow:0 -10px 40px rgba(124,111,224,0.25), 0 -4px 20px rgba(0,0,0,0.5);
  z-index:35;
  transform:translateY(calc(100% + 20px));
  opacity:0;
  pointer-events:none;
  transition:all 0.35s cubic-bezier(.2,.8,.2,1);
}
.quick-bar.show {
  transform:translateY(0);
  opacity:1;
  pointer-events:all;
}
.qb-title {
  display:flex; align-items:center; gap:8px;
  font-size:12px; font-weight:600;
  color:var(--text-dim);
  letter-spacing:0.04em;
  margin-bottom:10px;
}
.pulse {
  width:7px; height:7px; border-radius:999px; background:#5EE7A5;
  box-shadow:0 0 10px rgba(94,231,165,0.7);
  animation:pulseDot 1.6s ease-in-out infinite;
}
.qb-pills { display:flex; gap:6px; }
.qb-pill {
  flex:1; padding:10px 0;
  border-radius:12px;
  background:rgba(255,255,255,0.04);
  border:1.5px solid var(--border);
  color:var(--text); font-family:inherit;
  font-size:14px; font-weight:600;
  cursor:pointer; transition:all 0.15s;
  display:flex; flex-direction:row; align-items:center; justify-content:center; gap:4px;
}
.qb-pill .emoji { font-size:15px; }
.qb-pill[data-v="早班"].active {
  background:linear-gradient(135deg, rgba(255,184,107,0.25), rgba(255,184,107,0.08));
  border-color:var(--morning); color:#FFD9B2;
}
.qb-pill[data-v="晚班"].active {
  background:linear-gradient(135deg, rgba(155,124,232,0.28), rgba(124,111,224,0.1));
  border-color:var(--evening); color:#DCD2FF;
}
.qb-pill[data-v="休假"].active {
  background:linear-gradient(135deg, rgba(91,138,240,0.22), rgba(91,138,240,0.06));
  border-color:var(--secondary); color:#D0E0FF;
}
.qb-pill[data-v="erase"].active {
  background:linear-gradient(135deg, rgba(255,107,139,0.2), rgba(255,107,139,0.05));
  border-color:#FF8FA3; color:#FFC7D1;
}

/* 快速填班時日曆的 focus 指示 */
.day-cell.next-target {
  box-shadow: 0 0 0 2px rgba(94,231,165,0.6), 0 0 18px rgba(94,231,165,0.35);
  animation:targetPulse 1.4s ease-in-out infinite;
}
@keyframes targetPulse {
  0%,100% { box-shadow: 0 0 0 2px rgba(94,231,165,0.6), 0 0 18px rgba(94,231,165,0.3); }
  50%     { box-shadow: 0 0 0 2px rgba(94,231,165,0.9), 0 0 24px rgba(94,231,165,0.55); }
}

.input-wrap {
  background:rgba(255,255,255,0.04);
  border:1.5px solid var(--border);
  border-radius:16px;
  padding:14px 16px;
  margin-bottom:16px;
  display:flex; align-items:center; gap:10px;
  transition:all 0.15s;
}
.input-wrap:focus-within {
  border-color:rgba(168,156,240,0.6);
  background:rgba(124,111,224,0.08);
  box-shadow:0 0 0 3px rgba(124,111,224,0.14);
}
.input-wrap .icon { font-size:18px; opacity:0.75; }
.input-wrap .prefix { font-size:16px; font-weight:700; color:var(--text-dim); }
.input-wrap input {
  flex:1; background:transparent; border:0; outline:0;
  font-family:inherit; font-size:16px; color:var(--text); font-weight:500;
}
.input-wrap input::placeholder { color:var(--text-mute); }

.save-btn {
  width:100%; padding:18px;
  border-radius:18px; border:0;
  background:linear-gradient(135deg, #7C6FE0, #5B8AF0);
  color:#fff; font-family:inherit;
  font-size:17px; font-weight:700; letter-spacing:0.02em;
  cursor:pointer; margin-top:14px;
  box-shadow:0 12px 32px -8px rgba(124,111,224,0.6), inset 0 1px 0 rgba(255,255,255,0.2);
  transition:all 0.2s;
}
.save-btn:hover { transform:translateY(-2px); box-shadow:0 16px 40px -8px rgba(124,111,224,0.7), inset 0 1px 0 rgba(255,255,255,0.2); }
.save-btn:active { transform:translateY(0); }

/* 入場動畫 */
@keyframes riseIn {
  from { opacity:0; transform:translateY(18px); }
  to   { opacity:1; transform:translateY(0); }
}
.app-header    { animation:riseIn 0.7s cubic-bezier(.2,.8,.2,1) both; animation-delay:0.02s; }
.hero          { animation:riseIn 0.7s cubic-bezier(.2,.8,.2,1) both; animation-delay:0.12s; }
.calendar-card { animation:riseIn 0.7s cubic-bezier(.2,.8,.2,1) both; animation-delay:0.22s; }

</style>
</head>
<body>
<div class="stage">
  <div class="phone-wrap">
    <div class="aurora a1"></div>
    <div class="aurora a2"></div>
    <div class="aurora a3"></div>

    <div class="phone">
      <!-- 狀態列 -->
      <div class="status-bar">
        <span>9:41</span>
        <div class="icons">
          <span>●●●●</span>
          <span>􀙇</span>
          <span>􀛨</span>
        </div>
      </div>

      <div class="screen">
        <!-- 頂部日期 + 語言 -->
        <header class="app-header">
          <div class="date-stack">
            <div class="eyebrow">TODAY · 今日</div>
            <div class="big-day" id="big-day">18</div>
            <div class="sub" id="sub-day">4月 · 星期六</div>
          </div>
          <div class="header-tools">
            <button class="tool-pill quick-toggle" id="quickToggle" onclick="toggleQuickFill()" title="快速填班模式">
              <span class="dot-ind"></span>
              <span>快速填班</span>
            </button>
            <button class="lang-pill" onclick="cycleLang()">
              <span id="flag">🇹🇼</span>
              <span id="lang-label">繁</span>
            </button>
          </div>
        </header>

        <!-- 本月概況卡 -->
        <section class="hero">
          <div class="hero-row">
            <div class="hero-label">本月概況</div>
            <div class="hero-badge">APR 2026</div>
          </div>
          <div class="hero-amount">
            <span class="hero-currency">NT$</span>
            <span id="spent-num">0</span>
          </div>
          <div class="hero-sub">本月已花費</div>

          <div class="hero-stats">
            <div class="hero-stat">
              <div class="tag">上班天數</div>
              <div class="val" id="work-days-num">0<small>天</small></div>
            </div>
            <div class="hero-stat">
              <div class="tag">剩餘預算</div>
              <div class="val"><span style="font-size:16px; opacity:0.8;">NT$</span><span id="remain-num">0</span></div>
            </div>
          </div>

          <div class="hero-bar"><div class="hero-bar-fill" id="bar"></div></div>
        </section>

        <!-- 本週摘要條 -->
        <section class="week-strip" id="weekStrip"></section>

        <!-- 月曆 -->
        <section class="calendar-card">
          <div class="cal-header">
            <div class="cal-title">April 2026</div>
            <div class="cal-nav">
              <button class="ghost-btn" onclick="copyLastWeek()" title="把上週班表複製到本週">
                <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><rect x="8" y="8" width="12" height="12" rx="2"/><path d="M4 16V6a2 2 0 0 1 2-2h10"/></svg>
                複製上週
              </button>
              <button aria-label="上個月">‹</button>
              <button aria-label="下個月">›</button>
            </div>
          </div>
          <div class="weekday-row" id="weekdays"></div>
          <div class="days-grid" id="days"></div>
          <div class="legend">
            <div class="legend-item"><span class="sw m"></span>早班</div>
            <div class="legend-item"><span class="sw e"></span>晚班</div>
            <div class="legend-item"><span class="sw o"></span>休假</div>
            <div class="legend-item"><span style="width:5px; height:5px; border-radius:999px; background:var(--warn);"></span>有花費</div>
          </div>
        </section>
      </div>

      <!-- 遮罩 + 底部抽屜 -->
      <div class="scrim" id="scrim" onclick="closeSheet()"></div>
      <div class="sheet" id="sheet">
        <div class="handle"></div>
        <div class="sheet-title" id="sheet-title">4月 18 日</div>
        <div class="sheet-sub" id="sheet-sub">星期六 · 記錄這一天</div>

        <div class="field-label">班別</div>
        <div class="shift-row">
          <button class="shift-pill" data-v="早班" onclick="pickShift(this)"><span class="emoji">☀️</span>早班</button>
          <button class="shift-pill" data-v="晚班" onclick="pickShift(this)"><span class="emoji">🌙</span>晚班</button>
          <button class="shift-pill" data-v="休假" onclick="pickShift(this)"><span class="emoji">🌿</span>休假</button>
        </div>

        <div class="field-label">上班時間</div>
        <div class="input-wrap">
          <span class="icon">🕐</span>
          <input type="text" id="in-time" placeholder="例：09:00 – 18:00">
        </div>

        <div class="field-label">加給 / 扣除</div>
        <div class="bonus-row">
          <button class="bonus-chip" data-v="ot" onclick="toggleBonus(this)">
            <span>加班</span><span class="mul">×1.33</span>
          </button>
          <button class="bonus-chip" data-v="hol" onclick="toggleBonus(this)">
            <span>國定假</span><span class="mul">×2.0</span>
          </button>
          <button class="bonus-chip" data-v="brk" onclick="toggleBonus(this)">
            <span>午休扣</span><span class="mul">−1h</span>
          </button>
        </div>

        <div class="field-label">今日花費</div>
        <div class="input-wrap">
          <span class="prefix">NT$</span>
          <input type="number" id="in-expense" placeholder="0" inputmode="numeric">
        </div>

        <button class="save-btn" onclick="saveDay()">儲存記錄</button>
      </div>

      <!-- 快速填班浮動條 -->
      <div class="quick-bar" id="quickBar">
        <div class="qb-title">
          <span class="pulse"></span>
          <span>選班別後，點日期自動跳下一天</span>
        </div>
        <div class="qb-pills">
          <button class="qb-pill" data-v="早班" onclick="pickQuick(this)"><span class="emoji">☀️</span>早班</button>
          <button class="qb-pill" data-v="晚班" onclick="pickQuick(this)"><span class="emoji">🌙</span>晚班</button>
          <button class="qb-pill" data-v="休假" onclick="pickQuick(this)"><span class="emoji">🌿</span>休假</button>
          <button class="qb-pill qb-erase" data-v="erase" onclick="pickQuick(this)"><span class="emoji">✕</span>清除</button>
        </div>
      </div>

      <!-- 底部 nav -->
      <nav class="bottom-nav">
        <div class="nav-item active">
          <svg viewBox="0 0 24 24"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>
          首頁
        </div>
        <div class="nav-item">
          <svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 10h18M8 3v4M16 3v4"/></svg>
          班表
        </div>
        <div class="nav-item">
          <svg viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="12" rx="2"/><path d="M2 11h20M6 15h3"/></svg>
          薪資
        </div>
      </nav>
    </div>

    <div class="brand-hint">MYPLANNER · HOME · 390 × 844</div>
  </div>
</div>

<script>
/* ==========================================================
   資料：今天日期 + 各日班別/花費
   編輯 dayData 就能即時改變日曆顯示
   ========================================================== */
const today = { year: 2026, month: 4, day: 18 };
const monthBudget = 30000;

const dayData = {
  '2026-4-2':  { shift: '晚班' },
  '2026-4-3':  { shift: '早班', expense: 280 },
  '2026-4-5':  { shift: '休假' },
  '2026-4-6':  { shift: '早班', expense: 480 },
  '2026-4-7':  { shift: '晚班' },
  '2026-4-9':  { shift: '早班' },
  '2026-4-10': { shift: '晚班', expense: 1200 },
  '2026-4-12': { shift: '休假', expense: 620 },
  '2026-4-13': { shift: '早班' },
  '2026-4-14': { shift: '早班', expense: 220 },
  '2026-4-15': { shift: '晚班' },
  '2026-4-16': { shift: '晚班', expense: 650 },
  '2026-4-17': { shift: '早班', expense: 380 },
  '2026-4-18': { shift: '早班' },
};

/* ---------- 語言切換（僅示意） ---------- */
const langs = [
  { code: 'zh', label: '繁', flag: '🇹🇼' },
  { code: 'en', label: 'EN', flag: '🇺🇸' },
  { code: 'ja', label: '日', flag: '🇯🇵' },
];
let langIdx = 0;
function cycleLang() {
  langIdx = (langIdx + 1) % langs.length;
  document.getElementById('flag').textContent = langs[langIdx].flag;
  document.getElementById('lang-label').textContent = langs[langIdx].label;
}

/* ---------- 快速填班模式 ---------- */
let quickMode = false;
let quickShift = null;
let quickTargetDay = null;

function toggleQuickFill() {
  quickMode = !quickMode;
  const t = document.getElementById('quickToggle');
  const bar = document.getElementById('quickBar');
  t.classList.toggle('on', quickMode);
  bar.classList.toggle('show', quickMode);
  if (!quickMode) {
    quickShift = null;
    quickTargetDay = null;
    document.querySelectorAll('.qb-pill').forEach(p => p.classList.remove('active'));
    buildCalendar();
  } else {
    // 預設從今天開始
    quickTargetDay = today.day;
    buildCalendar();
  }
}

function pickQuick(el) {
  document.querySelectorAll('.qb-pill').forEach(p => p.classList.remove('active'));
  if (quickShift === el.dataset.v) {
    quickShift = null;
  } else {
    quickShift = el.dataset.v;
    el.classList.add('active');
  }
}

function applyQuick(day) {
  if (!quickShift) return false;
  const key = `${today.year}-${today.month}-${day}`;
  if (quickShift === 'erase') {
    delete dayData[key];
  } else {
    const existing = dayData[key] || {};
    existing.shift = quickShift;
    dayData[key] = existing;
  }
  const daysInMonth = new Date(today.year, today.month, 0).getDate();
  quickTargetDay = day < daysInMonth ? day + 1 : null;
  buildCalendar();
  recalcHero();
  renderWeekStrip();
  return true;
}

/* ---------- 複製上週 ---------- */
function copyLastWeek() {
  const t = new Date(today.year, today.month - 1, today.day);
  const thisWeekStart = new Date(t);
  thisWeekStart.setDate(t.getDate() - t.getDay());
  let copied = 0;
  for (let i = 0; i < 7; i++) {
    const cur = new Date(thisWeekStart); cur.setDate(thisWeekStart.getDate() + i);
    const prev = new Date(cur); prev.setDate(cur.getDate() - 7);
    if (prev.getMonth() + 1 !== today.month) continue;
    const srcKey = `${prev.getFullYear()}-${prev.getMonth()+1}-${prev.getDate()}`;
    const dstKey = `${cur.getFullYear()}-${cur.getMonth()+1}-${cur.getDate()}`;
    if (dayData[srcKey]) {
      dayData[dstKey] = { ...dayData[srcKey] };
      delete dayData[dstKey].expense;
      copied++;
    }
  }
  buildCalendar();
  recalcHero();
  renderWeekStrip();
  flash(`已複製上週 ${copied} 天班別`);
}

function flash(msg) {
  let t = document.getElementById('toast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'toast';
    t.style.cssText = 'position:absolute;top:70px;left:50%;transform:translateX(-50%);background:rgba(22,22,34,0.96);border:1px solid rgba(168,156,240,0.4);color:#EDE8FF;padding:10px 18px;border-radius:999px;font-size:13px;font-weight:600;backdrop-filter:blur(20px);z-index:80;opacity:0;transition:opacity 0.25s;pointer-events:none;box-shadow:0 10px 30px rgba(124,111,224,0.3);';
    document.querySelector('.phone').appendChild(t);
  }
  t.textContent = msg;
  t.style.opacity = '1';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.style.opacity = '0', 1800);
}

/* ---------- 本週摘要 ---------- */
function renderWeekStrip() {
  const strip = document.getElementById('weekStrip');
  const t = new Date(today.year, today.month - 1, today.day);
  const wStart = new Date(t); wStart.setDate(t.getDate() - t.getDay());
  let mCount = 0, eCount = 0, oCount = 0, exp = 0;
  for (let i = 0; i < 7; i++) {
    const c = new Date(wStart); c.setDate(wStart.getDate() + i);
    if (c.getMonth() + 1 !== today.month) continue;
    const key = `${c.getFullYear()}-${c.getMonth()+1}-${c.getDate()}`;
    const d = dayData[key];
    if (!d) continue;
    if (d.shift === '早班') mCount++;
    if (d.shift === '晚班') eCount++;
    if (d.shift === '休假') oCount++;
    if (d.expense) exp += d.expense;
  }
  strip.innerHTML = `
    <div class="week-chip total">
      <span class="wc-label">本週</span>
      <span class="wc-val">${mCount + eCount} 天</span>
    </div>
    <div class="week-chip">
      <span class="wc-label">早</span>
      <span class="wc-val"><span class="sw m"></span>${mCount}</span>
    </div>
    <div class="week-chip">
      <span class="wc-label">晚</span>
      <span class="wc-val"><span class="sw e"></span>${eCount}</span>
    </div>
    <div class="week-chip">
      <span class="wc-label">休</span>
      <span class="wc-val"><span class="sw o"></span>${oCount}</span>
    </div>
    <div class="week-chip">
      <span class="wc-label">花費</span>
      <span class="wc-val">$${exp.toLocaleString()}</span>
    </div>
  `;
}

/* ---------- 加給切換 ---------- */
function toggleBonus(el) {
  el.classList.toggle('active');
}

/* ---------- 日曆渲染 ---------- */
const weekdayHeaders = ['日','一','二','三','四','五','六'];
const weekdayFull    = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];

const wdRow = document.getElementById('weekdays');
weekdayHeaders.forEach(w => {
  const d = document.createElement('div');
  d.textContent = w;
  wdRow.appendChild(d);
});

function buildCalendar() {
  const grid = document.getElementById('days');
  grid.innerHTML = '';
  const first = new Date(today.year, today.month - 1, 1);
  const startWd = first.getDay();
  const daysInMonth = new Date(today.year, today.month, 0).getDate();
  const prevMonthDays = new Date(today.year, today.month - 1, 0).getDate();

  for (let i = startWd - 1; i >= 0; i--) {
    grid.appendChild(makeCell(prevMonthDays - i, true));
  }
  for (let d = 1; d <= daysInMonth; d++) {
    grid.appendChild(makeCell(d, false));
  }
  const totalCells = startWd + daysInMonth;
  const pad = (7 - (totalCells % 7)) % 7;
  for (let i = 1; i <= pad; i++) {
    grid.appendChild(makeCell(i, true));
  }
}

function makeCell(num, outside) {
  const cell = document.createElement('div');
  const cls = ['day-cell'];
  if (outside) cls.push('outside');
  if (!outside) {
    const key = `${today.year}-${today.month}-${num}`;
    const data = dayData[key];
    if (num === today.day) cls.push('today');
    if (data) {
      if (data.shift === '早班') cls.push('has-morning');
      if (data.shift === '晚班') cls.push('has-evening');
      if (data.shift === '休假') cls.push('has-off');
      if (data.expense != null) cls.push('has-expense');
    }
    if (quickMode && num === quickTargetDay) cls.push('next-target');
    cell.onclick = () => {
      if (quickMode) {
        if (applyQuick(num)) return;
      }
      openSheet(num);
    };
  }
  cell.className = cls.join(' ');
  cell.innerHTML = `<div class="dot"></div><div class="num">${num}</div>`;
  return cell;
}
buildCalendar();
renderWeekStrip();

/* ---------- 本月概況計算 + 動畫 ---------- */
function recalcHero() {
  let totalExpense = 0;
  let workDays = 0;
  for (const key in dayData) {
    const d = dayData[key];
    if (d.expense) totalExpense += d.expense;
    if (d.shift === '早班' || d.shift === '晚班') workDays++;
  }
  animateNum('spent-num', totalExpense, 1100);
  animateNum('work-days-num', workDays, 900, '<small>天</small>');
  const remain = Math.max(0, monthBudget - totalExpense);
  animateNum('remain-num', remain, 1100);
  const pct = Math.min(100, (totalExpense / monthBudget) * 100);
  setTimeout(() => { document.getElementById('bar').style.width = pct + '%'; }, 120);
}

function animateNum(id, target, dur, suffix = '') {
  const el = document.getElementById(id);
  const t0 = performance.now();
  function tick(t) {
    const p = Math.min(1, (t - t0) / dur);
    const eased = 1 - Math.pow(1 - p, 3);
    const v = Math.round(target * eased);
    el.innerHTML = v.toLocaleString() + suffix;
    if (p < 1) requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

recalcHero();

/* ---------- 底部抽屜 ---------- */
let activeDay = today.day;

function openSheet(d) {
  activeDay = d;
  const key = `${today.year}-${today.month}-${d}`;
  const data = dayData[key] || {};
  const wd = new Date(today.year, today.month - 1, d).getDay();

  document.getElementById('sheet-title').textContent = `${today.month}月 ${d} 日`;
  document.getElementById('sheet-sub').textContent = `${weekdayFull[wd]} · 記錄這一天`;

  document.querySelectorAll('.shift-pill').forEach(p => {
    p.classList.toggle('active', p.dataset.v === data.shift);
  });
  document.getElementById('in-time').value = data.time || '';
  document.getElementById('in-expense').value = data.expense || '';

  document.querySelectorAll('.bonus-chip').forEach(c => {
    c.classList.toggle('active', (data.bonus || []).includes(c.dataset.v));
  });

  document.getElementById('sheet').classList.add('show');
  document.getElementById('scrim').classList.add('show');
}

function closeSheet() {
  document.getElementById('sheet').classList.remove('show');
  document.getElementById('scrim').classList.remove('show');
}

function pickShift(el) {
  const already = el.classList.contains('active');
  document.querySelectorAll('.shift-pill').forEach(p => p.classList.remove('active'));
  if (!already) el.classList.add('active');
}

function saveDay() {
  const key = `${today.year}-${today.month}-${activeDay}`;
  const picked = document.querySelector('.shift-pill.active');
  const entry = {};
  if (picked) entry.shift = picked.dataset.v;
  const t = document.getElementById('in-time').value.trim();
  if (t) entry.time = t;
  const exp = document.getElementById('in-expense').value.trim();
  if (exp) entry.expense = parseInt(exp);
  const bonuses = [...document.querySelectorAll('.bonus-chip.active')].map(c => c.dataset.v);
  if (bonuses.length) entry.bonus = bonuses;
  if (Object.keys(entry).length) dayData[key] = entry;
  else delete dayData[key];

  buildCalendar();
  recalcHero();
  renderWeekStrip();
  closeSheet();
}

/* ESC 關閉抽屜 */
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeSheet(); });
</script>
</body>
</html>
